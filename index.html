<title>Admitica — Поступление в Европу</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var forced = params.get('view');
  // Onboarding gate: redirect to onboarding unless completed (or explicitly skipped)
  function gateOnboarding() {
    var onboarded = false;
    try { onboarded = localStorage.getItem('admitica.onboarded') === 'true'; } catch (e) {}
    var force = params.get('onboarding') === 'force';
    var skip = params.get('onboarding') === 'skip';
    if ((!onboarded || force) && !skip) { location.replace('onboarding.html'); return true; }
    return false;
  }
  // The legacy mobile.html build was removed. While this legacy page is still
  // the site root (preview deploys), phones go to the new responsive app,
  // which the deploy workflow publishes next to it at next/.
  // A prod-mode deploy replaces this file with the new app entirely.
  if (forced === 'desktop') { sessionStorage.setItem('admitica.view', 'desktop'); gateOnboarding(); return; }
  if (sessionStorage.getItem('admitica.view') === 'desktop') { gateOnboarding(); return; }
  var ua = navigator.userAgent || '';
  var isPhoneUA = /Mobi|Android|iPhone|iPod|Windows Phone|BlackBerry|Opera Mini|IEMobile/i.test(ua);
  var isSmallScreen = window.matchMedia('(max-width: 768px)').matches;
  var isTouchOnly = (navigator.maxTouchPoints > 0) && window.matchMedia('(pointer: coarse)').matches;
  if (isPhoneUA || (isSmallScreen && isTouchOnly)) {
    location.replace('next/');
    return;
  }
  gateOnboarding();
})();
</script>
