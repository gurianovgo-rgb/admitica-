# Admitica — деплой на GitHub Pages через Actions.
#
# БЕЗОПАСНОСТЬ (фаза 0):
#   • Запуск ТОЛЬКО вручную (workflow_dispatch) — сам по себе не срабатывает.
#   • Пока в Settings → Pages источник = "Deploy from a branch", деплой-шаг
#     просто упадёт с ошибкой и НИЧЕГО не перезапишет (двойной предохранитель).
#   • Режим по умолчанию — preview: старый сайт копируется в корень КАК ЕСТЬ,
#     новый Vite-апп кладётся рядом на /admitica-/next/. Старые URL не меняются.
#   • Режим prod (новый апп в корне /admitica-/) — выбирается явно при запуске,
#     только когда решим переходить.
#
# Файл должен попасть в main, чтобы в UI появилась кнопка Run workflow
# (это безопасно: добавление файла workflow не влияет на живой сайт).

name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим деплоя"
        type: choice
        default: preview
        options:
          - preview   # легаси в корне + новый апп на /next/ (старый сайт не трогаем)
          - prod      # новый апп в корне /admitica-/ (ТОЛЬКО при переходе на прод)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        working-directory: app
        run: npm ci

      - name: Build (base path depends on mode)
        working-directory: app
        env:
          BASE_PATH: ${{ inputs.mode == 'prod' && '/admitica-/' || '/admitica-/next/' }}
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p site
          if [ "${{ inputs.mode }}" = "prod" ]; then
            cp -r app/dist/* site/
          else
            # Legacy site verbatim at the root — live URLs stay identical
            cp index.html mobile.html onboarding.html onboarding-mobile.html styles.css config.example.js site/ 2>/dev/null || true
            cp -r data src src-mobile site/
            # New app next to it
            mkdir -p site/next
            cp -r app/dist/* site/next/
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
